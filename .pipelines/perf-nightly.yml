# .pipelines/perf-nightly.yml
#
# Required variable group "perf-tests-secrets" must contain:
#   (same set as perf-gate.yml — see that file for the full list, including
#    OUTPUT_STORAGE_ACCOUNT_NAME and OUTPUT_BLOB_CONTAINER_NAME)
#
# This pipeline runs the smoke scenario nightly for visibility.
# Switch to tests/scenarios/load.js if you want a full nightly soak test.

trigger: none

schedules:
  - cron: "0 2 * * *"
    displayName: Nightly 02:00 UTC
    branches:
      include:
        - main
    always: true   # run even if no new commits

# Pool options (pick one):
#
#   Microsoft-hosted (no k6 pre-installed):
#     pool:
#       vmImage: ubuntu-latest
#
#   Self-hosted agent pool (k6 pre-installed on the agent VM/image):
#     pool:
#       name: <YOUR-SELF-HOSTED-POOL-NAME>   # TODO: set pool name
#
#   Container job (k6 pre-installed in a Docker image):
#     pool:
#       vmImage: ubuntu-latest          # or a self-hosted pool
#     container: <YOUR-REGISTRY>/<YOUR-IMAGE>:<TAG>   # TODO: set image
#
# NOTE: A self-hosted agent or container image is required if ADF/storage
#       endpoints are behind a private network or VNet-injected.
pool:
  vmImage: ubuntu-latest

variables:
  - group: perf-tests-secrets

steps:
  # Remove or uncomment the block below if k6 is NOT pre-installed in your agent/container image.
  # - script: |
  #     curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
  #     echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
  #       | sudo tee /etc/apt/sources.list.d/k6.list
  #     sudo apt-get update -qq
  #     sudo apt-get install -y k6
  #   displayName: Install k6

  - script: k6 version
    displayName: k6 version

  - script: mkdir -p results
    displayName: Create results directory

  - script: |
      k6 run tests/scenarios/smoke.js
    displayName: Run k6 smoke test (nightly)
    env:
      TENANT_ID:            $(TENANT_ID)
      CLIENT_ID:            $(CLIENT_ID)
      CLIENT_SECRET:        $(CLIENT_SECRET)
      SUBSCRIPTION_ID:      $(SUBSCRIPTION_ID)
      RESOURCE_GROUP:       $(RESOURCE_GROUP)
      ADF_FACTORY_NAME:     $(ADF_FACTORY_NAME)
      ADF_PIPELINE_NAME:    $(ADF_PIPELINE_NAME)
      STORAGE_ACCOUNT_NAME:        $(STORAGE_ACCOUNT_NAME)
      BLOB_CONTAINER_NAME:         $(BLOB_CONTAINER_NAME)
      OUTPUT_STORAGE_ACCOUNT_NAME: $(OUTPUT_STORAGE_ACCOUNT_NAME)
      OUTPUT_BLOB_CONTAINER_NAME:  $(OUTPUT_BLOB_CONTAINER_NAME)

  - task: PublishTestResults@2
    displayName: Publish JUnit results
    condition: always()
    inputs:
      testResultsFormat:     JUnit
      testResultsFiles:      results/summary.xml
      failTaskOnFailedTests: false   # visibility only — does not block nightly
